components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: forgec2_session
      description: Session cookie obtained from login endpoint

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    TaskResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        task_id:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
