openapi: 3.0.3
info:
  title: ForgeC2 Command & Control API
  description: |
    ForgeC2 is a professional-grade command and control framework for red team operations.
    
    ## Authentication
    All API endpoints require authentication unless otherwise noted.
    Authentication is done via session cookie (`forgec2_session`) obtained from the login endpoint.
    
    ## Rate Limiting
    - Login: Limited attempts with lockout
    - API: Token bucket rate limiting per user
    
    ## Permissions
    Role-based access control:
    - **admin**: Full control
    - **operator**: Can interact with agents, listeners, tasks, credentials
    - **viewer**: Read-only access
    - **guest**: Limited read access (agents, listeners, tasks only)
    
  version: 2.0.0
  contact:
    name: ForgeC2 Support
    email: support@forgec2.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://c2.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Agents
    description: Implant/Agent management and operations
  - name: Listeners
    description: C2 listener configuration and management
  - name: Tasks
    description: Task management and execution
  - name: Credentials
    description: Credential vault management
  - name: Files
    description: File operations on agents
  - name: Users
    description: User management (admin only)
  - name: Settings
    description: System configuration and settings
  - name: Audit
    description: Audit log access
  - name: Automation
    description: Automation rules and webhooks
  - name: Monitor
    description: System monitoring and alerts
  - name: BOF
    description: Beacon Object File management
  - name: Plugins
    description: Plugin management
  - name: Chat
    description: Operator chat system
  - name: Tokens
    description: Windows token impersonation
  - name: SOCKS
    description: SOCKS proxy relay
  - name: Lateral Movement
    description: Lateral movement operations
  - name: Privilege Escalation
    description: Privilege escalation operations
  - name: Scanner
    description: Network scanning
  - name: Timeline
    description: Event timeline
  - name: Report
    description: Report generation
  - name: Infrastructure
    description: Infrastructure management
  - name: Generate
    description: Payload generation
  - name: Templates
    description: Command templates
  - name: Collaboration
    description: Multi-user collaboration

paths:
  /login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user and establish session cookie
      operationId: login
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: admin
                totp_code:
                  type: string
                  description: Two-factor authentication code (if enabled)
                remember_me:
                  type: string
                  enum: [on, ""]
                  description: Remember me option
      responses:
        '302':
          description: Login successful (redirect to dashboard)
          headers:
            Set-Cookie:
              schema:
                type: string
              description: forgec2_session cookie
        '200':
          description: Login failed (returns login page with error)
          content:
            text/html:
              schema:
                type: string

  /logout:
    post:
      tags: [Authentication]
      summary: User logout
      description: Terminate current session
      operationId: logout
      security:
        - SessionCookie: []
      responses:
        '302':
          description: Logout successful (redirect to login)

  /health:
    get:
      tags: [Authentication]
      summary: Health check
      description: Check if server is healthy
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  uptime:
                    type: string
                  goroutine:
                    type: integer

  /api/agents:
    get:
      tags: [Agents]
      summary: List all agents
      description: Retrieve a paginated list of all agents with optional filters
      operationId: listAgents
      security:
        - SessionCookie: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by hostname, username, or IP
        - name: status
          in: query
          schema:
            type: string
            enum: [online, stale, offline]
          description: Filter by agent status
        - name: os
          in: query
          schema:
            type: string
          description: Filter by operating system
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/agents/unlinked:
    get:
      tags: [Agents]
      summary: List unlinked agents
      description: Retrieve agents that are not linked (direct connection only)
      operationId: listUnlinkedAgents
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Get agent detail page
      description: Render agent detail HTML page
      operationId: getAgentDetailPage
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent detail page
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Agent not found

    delete:
      tags: [Agents]
      summary: Delete agent
      description: Remove an agent from the system
      operationId: deleteAgent
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{id}/kill:
    post:
      tags: [Agents]
      summary: Kill agent
      description: Send kill command to agent
      operationId: killAgent
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Kill command sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/lock:
    post:
      tags: [Agents]
      summary: Lock agent
      description: Lock agent for exclusive use by current operator
      operationId: lockAgent
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /agents/{id}/unlock:
    post:
      tags: [Agents]
      summary: Unlock agent
      description: Release agent lock
      operationId: unlockAgent
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /agents/{id}/note:
    post:
      tags: [Agents]
      summary: Update agent note
      description: Update notes for an agent
      operationId: updateAgentNote
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        '200':
          description: Note updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /agents/{id}/tasks:
    get:
      tags: [Tasks, Agents]
      summary: List agent tasks
      description: Retrieve all tasks for a specific agent
      operationId: listAgentTasks
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
          description: Filter by task status
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agents/{id}/tasks/{taskId}:
    get:
      tags: [Tasks, Agents]
      summary: Get task status
      description: Retrieve detailed information about a specific task
      operationId: getTaskStatus
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{id}/tasks/{taskId}/cancel:
    post:
      tags: [Tasks, Agents]
      summary: Cancel task
      description: Cancel a pending task
      operationId: cancelTask
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /agents/{id}/task/{taskId}/rerun:
    post:
      tags: [Tasks, Agents]
      summary: Rerun task
      description: Re-execute a completed or failed task
      operationId: rerunTask
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task requeued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/batch:
    post:
      tags: [Agents]
      summary: Batch command
      description: Send command to multiple agents simultaneously
      operationId: batchCommand
      security:
        - SessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [agent_ids, command]
              properties:
                agent_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                command:
                  type: string
                type:
                  type: string
                  default: shell
      responses:
        '200':
          description: Batch commands dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        agent_id:
                          type: string
                        task_id:
                          type: integer

  /agents/{id}/command:
    post:
      tags: [Agents]
      summary: Execute shell command
      description: Execute a shell command on the agent
      operationId: executeCommand
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  description: Command to execute
                shell:
                  type: string
                  description: Shell to use (cmd.exe, powershell.exe, /bin/bash, etc.)
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/screenshot:
    post:
      tags: [Agents]
      summary: Take screenshot
      description: Capture a screenshot from the agent
      operationId: requestScreenshot
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Screenshot task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/ps:
    post:
      tags: [Agents]
      summary: List processes
      description: List running processes on the agent
      operationId: requestPS
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Process list task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/upload:
    post:
      tags: [Files, Agents]
      summary: Upload file to agent
      description: Upload a file to the agent filesystem
      operationId: uploadFile
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, path]
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                  description: Destination path on agent
      responses:
        '200':
          description: Upload task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/download:
    post:
      tags: [Files, Agents]
      summary: Download file from agent
      description: Download a file from the agent filesystem
      operationId: downloadFile
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: File path to download
      responses:
        '200':
          description: Download task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/files/ls:
    post:
      tags: [Files, Agents]
      summary: List directory
      description: List files in a directory on the agent
      operationId: listDir
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Directory path (default: C:\)
      responses:
        '200':
          description: Directory list task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/files/delete:
    post:
      tags: [Files, Agents]
      summary: Delete file
      description: Delete a file on the agent
      operationId: deleteFile
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: File path to delete
      responses:
        '200':
          description: Delete task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/files/read:
    post:
      tags: [Files, Agents]
      summary: Read file
      description: Read a file's contents from the agent
      operationId: readFile
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: File path to read
      responses:
        '200':
          description: Read task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /agents/{id}/socks_relay/status:
    get:
      tags: [SOCKS, Agents]
      summary: Get SOCKS relay status
      description: Check SOCKS relay status for an agent
      operationId: getSocksRelayStatus
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SOCKS status
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  port:
                    type: integer

  /agents/{id}/socks_relay/start:
    post:
      tags: [SOCKS, Agents]
      summary: Start SOCKS relay
      description: Start SOCKS5 proxy relay through agent
      operationId: startSocksRelay
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SOCKS relay started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  port:
                    type: integer

  /agents/{id}/socks_relay/stop:
    post:
      tags: [SOCKS, Agents]
      summary: Stop SOCKS relay
      description: Stop SOCKS5 proxy relay
      operationId: stopSocksRelay
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SOCKS relay stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /socks/sessions:
    get:
      tags: [SOCKS]
      summary: List SOCKS sessions
      description: List all active SOCKS relay sessions
      operationId: listSocksSessions
      security:
        - SessionCookie: []
      responses:
        '200':
          description: SOCKS sessions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SocksSession'

  /api/listeners:
    get:
      tags: [Listeners]
      summary: List all listeners
      description: Retrieve all configured listeners
      operationId: listListeners
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Listener'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Listeners]
      summary: Create listener
      description: Create a new listener configuration
      operationId: createListener
      security:
        - SessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListenerCreate'
      responses:
        '201':
          description: Listener created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listener'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/listeners/{id}:
    put:
      tags: [Listeners]
      summary: Update listener
      description: Update an existing listener configuration
      operationId: updateListener
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListenerUpdate'
      responses:
        '200':
          description: Listener updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listener'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Listeners]
      summary: Delete listener
      description: Delete a listener configuration
      operationId: deleteListener
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Listener deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /credentials:
    get:
      tags: [Credentials]
      summary: Credentials page
      description: Render credentials vault HTML page
      operationId: getCredentialsPage
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Credentials page
          content:
            text/html:
              schema:
                type: string

  /credentials/export:
    get:
      tags: [Credentials]
      summary: Export credentials
      description: Export all credentials as CSV
      operationId: exportCredentials
      security:
        - SessionCookie: []
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /credentials/{cred_id}:
    get:
      tags: [Credentials]
      summary: Get credential
      description: Get a specific credential entry
      operationId: getCredential
      security:
        - SessionCookie: []
      parameters:
        - name: cred_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Credential entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Credentials]
      summary: Update credential
      description: Update a credential entry
      operationId: updateCredential
      security:
        - SessionCookie: []
      parameters:
        - name: cred_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                hash:
                  type: string
                notes:
                  type: string
                tags:
                  type: string
      responses:
        '200':
          description: Credential updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      tags: [Credentials]
      summary: Delete credential
      description: Delete a credential entry
      operationId: deleteCredential
      security:
        - SessionCookie: []
      parameters:
        - name: cred_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Credential deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /credentials/add:
    post:
      tags: [Credentials]
      summary: Add credential
      description: Manually add a credential entry
      operationId: addCredential
      security:
        - SessionCookie: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username]
              properties:
                domain:
                  type: string
                username:
                  type: string
                password:
                  type: string
                hash:
                  type: string
                source:
                  type: string
                type:
                  type: string
                notes:
                  type: string
                tags:
                  type: string
      responses:
        '200':
          description: Credential added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /credentials/batch/tags:
    post:
      tags: [Credentials]
      summary: Batch add tags
      description: Add tags to multiple credentials
