name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go mod tidy
        run: go mod tidy

      - name: Verify go.mod and go.sum are tidy
        run: git diff --exit-code go.mod go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/server/