{{define "topology_content"}}
<div class="max-w-6xl mx-auto mb-20 md:mb-0">
    <div class="ui-card shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-slate-800 to-slate-900 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-white/10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-project-diagram text-white"></i></div>
                <div><h2 class="text-lg font-semibold text-white">Network Topology</h2><p class="text-xs text-slate-400 dark:text-slate-500">监听器与 Implant 连接关系图</p></div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 text-xs">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span><span class="text-emerald-300">在线</span>
                    <span class="w-3 h-3 rounded-full bg-slate-500 inline-block ml-2"></span><span class="text-slate-400 dark:text-slate-500">离线</span>
                    <span class="w-3 h-3 rounded-full bg-indigo-500 inline-block ml-2"></span><span class="text-indigo-300">监听器</span>
                </div>
                <button data-action="load-topology" class="px-3 h-8 bg-white/10 hover:bg-white/20 text-white rounded-xl text-xs transition-colors"><i class="fa-solid fa-rotate mr-1"></i>刷新</button>
            </div>
        </div>
        <div class="p-4">
            <div id="topology-container" style="height:600px; border-radius:16px;" class="border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900"></div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="/static/css/vis-network.min.css">
{{end}}
