{{define "topology_content"}}
<div class="max-w-6xl mx-auto">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-slate-800 to-slate-900 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-white/10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-project-diagram text-white"></i></div>
                <div><h2 class="text-lg font-semibold text-white">Network Topology</h2><p class="text-xs text-slate-400">监听器与 Agent 连接关系图</p></div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 text-xs">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span><span class="text-emerald-300">在线</span>
                    <span class="w-3 h-3 rounded-full bg-slate-500 inline-block ml-2"></span><span class="text-slate-400">离线</span>
                    <span class="w-3 h-3 rounded-full bg-indigo-500 inline-block ml-2"></span><span class="text-indigo-300">监听器</span>
                </div>
                <button onclick="loadTopology()" class="px-3 h-8 bg-white/10 hover:bg-white/20 text-white rounded-xl text-xs transition-colors"><i class="fa-solid fa-rotate mr-1"></i>刷新</button>
            </div>
        </div>
        <div class="p-4">
            <div id="topology-container" style="height:600px; background:#f8fafc; border-radius:16px;" class="border border-slate-200"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.6/dist/dist/vis-network.min.css">

<script>
var topologyNetwork = null;

document.addEventListener('DOMContentLoaded', function() {
    loadTopology();
});

function loadTopology() {
    const container = document.getElementById('topology-container');
    container.innerHTML = '<div class="flex items-center justify-center h-full text-slate-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>加载拓扑图...</div>';

    fetch('/api/topology/data')
        .then(r => r.json())
        .then(data => {
            container.innerHTML = '';
            if (!data.nodes || data.nodes.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-full text-slate-400"><i class="fa-solid fa-info-circle mr-2"></i>暂无 Agent 或监听器</div>';
                return;
            }

            const nodes = new vis.DataSet(data.nodes.map(n => ({
                id: n.id,
                label: n.label,
                title: n.title,
                group: n.group,
                font: { size: 12, color: '#1e293b' },
                borderWidth: 2,
                size: n.group === 'listener' ? 30 : 25,
            })));

            const edges = new vis.DataSet(data.edges.map(e => ({
                from: e.from,
                to: e.to,
                arrows: { to: { enabled: true, scaleFactor: 0.8 } },
                dashes: e.dashes || false,
                color: e.color || { color: '#94a3b8', highlight: '#6366f1' },
                smooth: { type: 'curvedCW', roundness: 0.15 },
                width: e.width || 2,
                title: e.title || '',
            })));

            const options = {
                physics: {
                    solver: 'forceAtlas2Based',
                    forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 200, springConstant: 0.02 },
                    stabilization: { iterations: 100 },
                },
                groups: {
                    listener: { color: { background: '#6366f1', border: '#4f46e5' }, shape: 'diamond', font: { color: '#3730a3', size: 13, face: 'monospace' } },
                    'agent-online': { color: { background: '#10b981', border: '#059669' }, shape: 'dot', font: { color: '#065f46', size: 12 } },
                    'agent-offline': { color: { background: '#94a3b8', border: '#64748b' }, shape: 'dot', font: { color: '#475569', size: 12 } },
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    zoomView: true,
                    dragView: true,
                },
                edges: {
                    width: 2,
                    color: { inherit: false },
                },
            };

            topologyNetwork = new vis.Network(container, { nodes, edges }, options);
        })
        .catch(err => {
            container.innerHTML = '<div class="flex items-center justify-center h-full text-red-400"><i class="fa-solid fa-exclamation-circle mr-2"></i>加载失败: ' + err.message + '</div>';
        });
}
</script>
{{end}}
