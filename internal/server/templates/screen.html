{{define "screen_content"}}
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
    <!-- Header -->
    <div class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <a href="/agents/{{.Agent.ID}}" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-semibold text-slate-900">屏幕监控</h1>
                    <div class="flex items-center gap-x-2 text-sm text-slate-500">
                        <span>{{.Agent.Hostname}}</span>
                        <span class="text-slate-300">•</span>
                        <span>{{.Agent.Username}}@{{.Agent.IP}}</span>
                        {{if eq .Agent.Status "online"}}
                        <span class="flex items-center text-emerald-500"><i class="fa-solid fa-circle fa-beat mr-1 text-[6px]"></i> 在线</span>
                        {{else}}
                        <span class="text-red-500">离线</span>
                        {{end}}
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-x-3">
                <button id="start-btn" onclick="startMonitor()" 
                        class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 h-11 rounded-xl text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-play"></i>
                    <span>开始监控</span>
                </button>
                <button id="stop-btn" onclick="stopMonitor()" 
                        class="bg-red-600 hover:bg-red-700 text-white px-6 h-11 rounded-xl text-sm font-medium flex items-center gap-x-2 hidden">
                    <i class="fa-solid fa-stop"></i>
                    <span>停止监控</span>
                </button>
                <button onclick="refreshScreenshot()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 h-11 rounded-xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>刷新</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-6">
        <!-- Screenshot Display -->
        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-3 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <i class="fa-solid fa-desktop text-indigo-500"></i>
                    <span class="text-sm font-medium text-slate-700">实时画面</span>
                </div>
                <div class="flex items-center gap-x-4 text-xs text-slate-500">
                    <span id="status-indicator" class="flex items-center">
                        <span class="w-2 h-2 bg-gray-400 rounded-full mr-2"></span>
                        <span>等待中</span>
                    </span>
                    <span id="last-update">最后更新: -</span>
                    <span id="fps-counter">FPS: 0</span>
                </div>
            </div>
            <div class="relative bg-black flex items-center justify-center" style="height: 75vh; min-height: 400px; max-height: 90vh;">
                <!-- Video-like container -->
                <div id="screenshot-container" class="relative w-full h-full flex items-center justify-center overflow-hidden">
                    <div id="screenshot-placeholder" class="text-center text-slate-400 py-20">
                        <i class="fa-solid fa-monitor text-6xl mb-4 opacity-50"></i>
                        <p class="text-lg">点击"开始监控"按钮开始捕获屏幕</p>
                        <p class="text-sm mt-2">Agent 需要在线才能接收截图任务</p>
                    </div>
                </div>
                
                <!-- Video-style controls overlay -->
                <div id="video-controls" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/70 backdrop-blur-sm rounded-full px-6 py-2 flex items-center gap-x-4 opacity-0 hover:opacity-100 transition-opacity duration-300">
                    <button id="play-pause-btn" onclick="toggleMonitor()" 
                            class="w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white">
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <div class="flex items-center gap-x-2 text-white text-sm">
                        <span id="time-display">00:00</span>
                        <span>/</span>
                        <span id="duration-display">--:--</span>
                    </div>
                    <input type="range" id="volume-slider" min="0" max="100" value="100" 
                           class="w-20 h-1 bg-white/30 rounded-full appearance-none cursor-pointer">
                    <button onclick="toggleFullscreen()" class="w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white">
                        <i class="fa-solid fa-expand"></i>
                    </button>
                </div>
                
                <!-- Loading spinner -->
                <div id="loading-spinner" class="absolute inset-0 flex items-center justify-center bg-black/50 opacity-0 pointer-events-none transition-opacity duration-300">
                    <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-6 bg-white border border-slate-200 rounded-3xl shadow-sm p-6">
            <div class="text-xs text-slate-500 mb-4 font-medium">监控设置</div>
            <div class="grid grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm text-slate-600 mb-2">刷新间隔</label>
                    <select id="refresh-interval" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 h-11 text-sm">
                        <option value="3">3 秒</option>
                        <option value="5" selected>5 秒</option>
                        <option value="10">10 秒</option>
                        <option value="15">15 秒</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-600 mb-2">图像质量</label>
                    <select id="image-quality" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 h-11 text-sm">
                        <option value="high">高</option>
                        <option value="medium" selected>中</option>
                        <option value="low">低</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-600 mb-2">自动刷新</label>
                    <div class="flex items-center h-11">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="auto-refresh" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                        <span class="ml-3 text-sm text-slate-600">启用</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-slate-600 mb-2">WebSocket</label>
                    <div class="flex items-center h-11">
                        <span id="ws-status" class="flex items-center text-xs">
                            <span class="w-2 h-2 bg-red-400 rounded-full mr-2"></span>
                            <span class="text-red-600">未连接</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const agentId = "{{.Agent.ID}}";
let isMonitoring = false;
let frameCount = 0;
let fpsInterval = null;
let lastFpsTime = Date.now();
let startTime = null;
let monitorTimer = null;


function startMonitor() {
    showLoading(true);
    
    fetch(`/agents/${agentId}/screen/start`, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'}
    }).then(r => r.json()).then(data => {
        showLoading(false);
        
        if (data.success) {
            isMonitoring = true;
            startTime = Date.now();
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');
            document.getElementById('status-indicator').innerHTML = 
                '<span class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span><span>监控中</span>';
            document.getElementById('play-pause-btn').innerHTML = '<i class="fa-solid fa-pause"></i>';
            document.getElementById('video-controls').style.opacity = '1';
            showToast('屏幕监控已启动');
            startFpsCounter();
            startMonitorTimer();
        } else {
            showError(data.error || '启动失败');
        }
    }).catch(err => {
        showLoading(false);
        console.error('Fetch error:', err);
        showError('网络错误: ' + err);
    });
}

function stopMonitor() {
    showLoading(true);
    fetch(`/agents/${agentId}/screen/stop`, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'}
    }).then(r => r.json()).then(data => {
        showLoading(false);
        if (data.success) {
            isMonitoring = false;
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('stop-btn').classList.add('hidden');
            document.getElementById('status-indicator').innerHTML = 
                '<span class="w-2 h-2 bg-gray-400 rounded-full mr-2"></span><span>已停止</span>';
            document.getElementById('play-pause-btn').innerHTML = '<i class="fa-solid fa-play"></i>';
            stopFpsCounter();
            stopMonitorTimer();
            showToast('屏幕监控已停止');
        } else {
            showError(data.error || '停止失败');
        }
    }).catch(err => {
        showLoading(false);
        showError('网络错误: ' + err);
    });
}

function toggleMonitor() {
    if (isMonitoring) {
        stopMonitor();
    } else {
        startMonitor();
    }
}

function refreshScreenshot() {
    if (!isMonitoring) {
        showLoading(true);
        fetch(`/agents/${agentId}/screenshot`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'}
        }).then(r => r.json()).then(data => {
            showLoading(false);
            if (data.success) {
                showToast('截图请求已发送');
                setTimeout(fetchScreenshot, 2000);
            } else {
                showError(data.error || '请求失败');
            }
        }).catch(err => {
            showLoading(false);
            showError('网络错误: ' + err);
        });
    }
}

function fetchScreenshot() {
    fetch(`/agents/${agentId}/tasks?type=screenshot`)
    .then(r => r.json()).then(data => {
        if (data && data.length > 0) {
            const latestTask = data[0];
            if (latestTask.result && latestTask.status === 'completed') {
                displayScreenshot(latestTask.result);
            }
        }
    }).catch(err => console.error('Failed to fetch screenshot:', err));
}

function displayScreenshot(base64Data) {
    const placeholder = document.getElementById('screenshot-placeholder');
    const container = document.getElementById('screenshot-container');
    
    // Hide placeholder if showing
    if (placeholder) {
        placeholder.style.display = 'none';
    }
    
    // Get or create the active image
    let activeImg = document.querySelector('.screen-image-active');
    let inactiveImg = document.querySelector('.screen-image-inactive');
    
    // If no images exist, create them
    if (!activeImg) {
        activeImg = document.createElement('img');
        activeImg.className = 'screen-image-active absolute inset-0 w-full h-full object-contain';
        activeImg.style.display = 'block';
        container.appendChild(activeImg);
    }
    if (!inactiveImg) {
        inactiveImg = document.createElement('img');
        inactiveImg.className = 'screen-image-inactive absolute inset-0 w-full h-full object-contain';
        inactiveImg.style.display = 'none';
        container.appendChild(inactiveImg);
    }
    
    // Load new image into inactive img first
    inactiveImg.onload = function() {
        // Swap images - no transition for smooth video-like experience
        activeImg.style.display = 'none';
        inactiveImg.style.display = 'block';
        
        // Swap classes
        activeImg.classList.remove('screen-image-active');
        activeImg.classList.add('screen-image-inactive');
        inactiveImg.classList.remove('screen-image-inactive');
        inactiveImg.classList.add('screen-image-active');
        
        // Update references for next time
        const temp = activeImg;
        activeImg = inactiveImg;
        inactiveImg = temp;
        
        frameCount++;
    };
    
    inactiveImg.onerror = function() {
        console.error('Failed to load screenshot image');
    };
    
    // Detect image type from base64 prefix for correct MIME (png or jpeg for monitoring)
    const mime = (base64Data && base64Data.indexOf('iVBOR') === 0) ? 'png' : 'jpeg';
    inactiveImg.src = 'data:image/' + mime + ';base64,' + base64Data;
    
    document.getElementById('last-update').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
}

function showLoading(show) {
    const spinner = document.getElementById('loading-spinner');
    if (spinner) {
        spinner.style.opacity = show ? '1' : '0';
        spinner.style.pointerEvents = show ? 'auto' : 'none';
    }
}

function startFpsCounter() {
    stopFpsCounter();
    fpsInterval = setInterval(() => {
        const now = Date.now();
        const elapsed = now - lastFpsTime;
        if (elapsed >= 1000) {
            const fps = Math.round(frameCount * 1000 / elapsed);
            document.getElementById('fps-counter').textContent = `FPS: ${fps}`;
            frameCount = 0;
            lastFpsTime = now;
        }
    }, 100);
}

function stopFpsCounter() {
    if (fpsInterval) {
        clearInterval(fpsInterval);
        fpsInterval = null;
    }
    document.getElementById('fps-counter').textContent = 'FPS: 0';
    frameCount = 0;
}

function startMonitorTimer() {
    stopMonitorTimer();
    monitorTimer = setInterval(() => {
        if (startTime && isMonitoring) {
            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            document.getElementById('time-display').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);
}

function stopMonitorTimer() {
    if (monitorTimer) {
        clearInterval(monitorTimer);
        monitorTimer = null;
    }
}

function toggleFullscreen() {
    const container = document.querySelector('.bg-white.border.border-slate-200.rounded-3xl.shadow-sm.overflow-hidden');
    if (container) {
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => {
                console.error('Fullscreen error:', err);
            });
        } else {
            document.exitFullscreen();
        }
    }
}

// WebSocket handling for real-time screenshot updates
function setupWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(protocol + '//' + window.location.host + '/ws');

    ws.onopen = function() {
        document.getElementById('ws-status').innerHTML = 
            '<span class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span><span class="text-emerald-600">已连接</span>';
    };

    ws.onmessage = function(event) {
        try {
            const data = JSON.parse(event.data);
            if (data.type === 'screenshot' && data.agent_id === agentId) {
                displayScreenshot(data.data);
            }
        } catch (e) {
            console.error('Failed to parse WebSocket message:', e);
        }
    };

    ws.onerror = function(error) {
        console.error('WebSocket error:', error);
        document.getElementById('ws-status').innerHTML = 
            '<span class="w-2 h-2 bg-red-400 rounded-full mr-2"></span><span class="text-red-600">错误</span>';
    };

    ws.onclose = function() {
        document.getElementById('ws-status').innerHTML = 
            '<span class="w-2 h-2 bg-red-400 rounded-full mr-2"></span><span class="text-red-600">已断开</span>';
        // Reconnect after 5 seconds
        setTimeout(setupWebSocket, 5000);
    };
}

function showToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'px-4 py-3 rounded-2xl shadow-xl flex items-center gap-x-3 text-sm bg-emerald-100 border border-emerald-300 text-emerald-700';
    toast.innerHTML = `<i class="fa-solid fa-check-circle"></i><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'all 0.3s ease';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function showError(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'px-4 py-3 rounded-2xl shadow-xl flex items-center gap-x-3 text-sm bg-red-100 border border-red-300 text-red-700';
    toast.innerHTML = `<i class="fa-solid fa-exclamation-circle"></i><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'all 0.3s ease';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// Initialize WebSocket connection
setupWebSocket();
</script>
{{end}}
