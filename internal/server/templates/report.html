{{define "report_content"}}
<div class="max-w-7xl mx-auto mb-20 md:mb-0">
    <!-- 页面标题 -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 sm:mb-6 gap-3">
        <div>
            <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">报告生成器</h1>
            <p class="text-slate-500 dark:text-slate-400 text-xs sm:text-sm mt-1">生成全面的行动报告，包含 Agent、任务、凭据和审计日志统计</p>
        </div>
    </div>

    <!-- 行动概览 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="ui-card p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">总 Implant 数</div>
                    <div class="text-3xl font-bold mt-2 text-indigo-600">{{.TotalAgents}}</div>
                    <div class="text-xs text-emerald-600 mt-1 font-medium">{{.OnlineAgents}} 在线</div>
                </div>
                <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-xl text-indigo-400"></i>
                </div>
            </div>
        </div>
        <div class="ui-card p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">任务执行</div>
                    <div class="text-3xl font-bold mt-2 text-emerald-600">{{.TotalTasks}}</div>
                    <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">{{.CompletedTasks}} 完成</div>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-list-check text-xl text-emerald-400"></i>
                </div>
            </div>
        </div>
        <div class="ui-card p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">凭据提取</div>
                    <div class="text-3xl font-bold mt-2 text-amber-600">{{.TotalCreds}}</div>
                    <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">已收集</div>
                </div>
                <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-key text-xl text-amber-400"></i>
                </div>
            </div>
        </div>
        <div class="ui-card p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">审计事件</div>
                    <div class="text-3xl font-bold mt-2 text-blue-600">{{.TotalAudits}}</div>
                    <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">已记录</div>
                </div>
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-xl text-blue-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 报告配置 -->
    <div class="ui-card p-6 shadow-sm">
        <div class="flex items-center gap-x-3 mb-5">
            <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-file-lines text-indigo-600"></i>
            </div>
            <div>
                <div class="text-sm font-semibold text-slate-900 dark:text-slate-100">生成报告</div>
                <div class="text-xs text-slate-500">选择日期范围和内容模块</div>
            </div>
        </div>

        <form id="report-form" class="space-y-6">
            <!-- 日期范围 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <i class="fa-solid fa-calendar-days mr-1.5 text-slate-400"></i>开始日期
                    </label>
                    <input type="date" id="start-date" value="{{.StartDate}}"
                           class="ui-input">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        <i class="fa-solid fa-calendar-check mr-1.5 text-slate-400"></i>结束日期
                    </label>
                    <input type="date" id="end-date" value="{{.EndDate}}"
                           class="ui-input">
                </div>
            </div>

            <!-- 内容模块 -->
            <div>
                <label class="block text-sm font-semibold text-slate-900 dark:text-slate-100 mb-3">包含内容</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="checkbox" id="include-agents" checked class="w-4 h-4 accent-indigo-600 rounded">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">🤖 Implant 列表</div>
                            <div class="text-xs text-slate-500">所有部署的 Implant 信息</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="checkbox" id="include-tasks" checked class="w-4 h-4 accent-indigo-600 rounded">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">📋 任务执行</div>
                            <div class="text-xs text-slate-500">执行的任务和结果</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="checkbox" id="include-creds" checked class="w-4 h-4 accent-indigo-600 rounded">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">🔑 凭据汇总</div>
                            <div class="text-xs text-slate-500">提取的凭据和密码</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="checkbox" id="include-screenshots" class="w-4 h-4 accent-indigo-600 rounded">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">📸 截图</div>
                            <div class="text-xs text-slate-500">屏幕截图记录</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="checkbox" id="include-audit" checked class="w-4 h-4 accent-indigo-600 rounded">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">📝 审计日志</div>
                            <div class="text-xs text-slate-500">用户操作记录</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- 导出格式 -->
            <div>
                <label class="block text-sm font-semibold text-slate-900 dark:text-slate-100 mb-3">导出格式</label>
                <div class="flex gap-3">
                    <label class="flex-1 flex items-center gap-3 p-4 border-2 border-indigo-500 bg-indigo-50 rounded-xl cursor-pointer">
                        <input type="radio" name="format" value="html" checked class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">🌐 HTML 报告</div>
                            <div class="text-xs text-slate-600">交互式网页报告（推荐）</div>
                        </div>
                    </label>
                    <label class="flex-1 flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="format" value="json" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900 dark:text-slate-100">📄 JSON 数据</div>
                            <div class="text-xs text-slate-500">结构化数据文件</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- 按钮 -->
            <div class="flex gap-3 pt-4 border-t border-slate-200">
                <button type="button" data-action="generate-report" class="flex-1 h-11 ui-btn ui-btn-primary">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>生成报告</span>
                </button>
                <button type="button" data-action="preview-report" class="px-6 h-11 ui-btn ui-btn-secondary">
                    <i class="fa-solid fa-eye"></i>
                    <span>预览</span>
                </button>
            </div>
        </form>
    </div>
</div>
{{end}}
