{{define "traffic_content"}}
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-slate-900">流量监控</h1>
                <div class="text-sm text-slate-500 mt-1">实时查看 Agent Beacon HTTP 请求</div>
            </div>
            <div class="flex items-center gap-x-3">
                <label class="flex items-center gap-x-2 text-sm text-slate-600">
                    <input type="checkbox" id="auto-refresh" checked onchange="toggleAutoRefresh()">
                    自动刷新
                </label>
                <button onclick="loadTraffic()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 h-11 rounded-xl text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-sync"></i>
                    <span>刷新</span>
                </button>
            </div>
        </div>
    </div>

    <div class="p-6">
        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-network-wired text-indigo-500"></i>
                        <span class="text-sm font-medium text-slate-700">Beacon 请求</span>
                    </div>
                    <span class="text-xs text-slate-500" id="traffic-count">最近 0 条</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">时间</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">方法</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">路径</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">源 IP</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">Agent</th>
                            <th class="text-center py-3 px-4 text-xs font-medium text-slate-500">状态</th>
                            <th class="text-right py-3 px-4 text-xs font-medium text-slate-500">大小</th>
                            <th class="text-right py-3 px-4 text-xs font-medium text-slate-500">延迟</th>
                        </tr>
                    </thead>
                    <tbody id="traffic-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="8" class="py-16 text-center text-slate-400">
                                <i class="fa-solid fa-spinner fa-spin text-xl mb-2"></i>
                                <p>加载中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let refreshTimer = null;

function loadTraffic() {
    fetch('/api/traffic')
    .then(r => r.json()).then(data => {
        if (data.success) {
            renderTraffic(data.data);
        }
    }).catch(() => showToast('流量数据加载失败', 'error'));
}

function renderTraffic(logs) {
    const tbody = document.getElementById('traffic-body');
    document.getElementById('traffic-count').textContent = '最近 ' + logs.length + ' 条';

    if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="py-16 text-center text-slate-400">暂无流量记录</td></tr>';
        return;
    }

    tbody.innerHTML = logs.map(log => {
        const time = new Date(log.time);
        const timeStr = time.toLocaleTimeString('zh-CN');
        const statusClass = log.status === 200 ? 'text-emerald-600 bg-emerald-100' :
                           log.status >= 400 ? 'text-red-600 bg-red-100' : 'text-amber-600 bg-amber-100';
        return '<tr class="hover:bg-slate-50 transition-colors font-mono text-xs">' +
            '<td class="py-2 px-4 text-slate-500">' + timeStr + '</td>' +
            '<td class="py-2 px-4"><span class="px-1.5 py-0.5 rounded text-xs font-medium ' + (log.method === 'POST' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700') + '">' + log.method + '</span></td>' +
            '<td class="py-2 px-4 text-slate-700 max-w-xs truncate">' + escapeHtml(log.path) + '</td>' +
            '<td class="py-2 px-4 text-slate-500">' + escapeHtml(log.remote_ip) + '</td>' +
            '<td class="py-2 px-4 text-slate-500">' + (log.agent_id ? log.agent_id.substring(0, 8) + '...' : '-') + '</td>' +
            '<td class="py-2 px-4 text-center"><span class="px-1.5 py-0.5 rounded text-xs ' + statusClass + '">' + log.status + '</span></td>' +
            '<td class="py-2 px-4 text-right text-slate-500">' + (log.size > 0 ? log.size + 'B' : '-') + '</td>' +
            '<td class="py-2 px-4 text-right text-slate-500">' + log.latency + '</td>' +
            '</tr>';
    }).join('');
}

function toggleAutoRefresh() {
    if (document.getElementById('auto-refresh').checked) {
        refreshTimer = setInterval(loadTraffic, 3000);
    } else {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = null;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.addEventListener('DOMContentLoaded', function() {
    loadTraffic();
    refreshTimer = setInterval(loadTraffic, 3000);
});
</script>
{{end}}
