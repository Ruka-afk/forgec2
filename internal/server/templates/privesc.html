{{define "privesc_content"}}
<div class="max-w-7xl mx-auto">
    <!-- 页面标题 -->
    <div class="flex items-end justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">权限提升侦查</h1>
            <p class="text-slate-500 text-sm mt-1">检测系统配置缺陷与可利用的提权向量</p>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">在线 Agent</div>
                    <div class="text-3xl font-bold mt-2 text-emerald-600">{{len .Agents}}</div>
                    <div class="text-xs text-slate-500 mt-1">可用于侦查</div>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-xl text-emerald-400"></i>
                </div>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Windows 检查</div>
                    <div class="text-3xl font-bold mt-2 text-blue-600">8</div>
                    <div class="text-xs text-slate-500 mt-1">检查项</div>
                </div>
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                    <i class="fa-brands fa-windows text-xl text-blue-400"></i>
                </div>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Linux 检查</div>
                    <div class="text-3xl font-bold mt-2 text-amber-600">6</div>
                    <div class="text-xs text-slate-500 mt-1">检查项</div>
                </div>
                <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center">
                    <i class="fa-brands fa-linux text-xl text-amber-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 提权侦查配置 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center gap-x-3 mb-5">
            <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-shield-virus text-indigo-600"></i>
            </div>
            <div>
                <div class="text-sm font-semibold text-slate-900">新建提权侦查任务</div>
                <div class="text-xs text-slate-500">选择 Agent 并执行权限提升检查</div>
            </div>
        </div>

        <form id="privesc-form" class="space-y-6">
            <!-- 目标 Agent -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    <i class="fa-solid fa-robot mr-1.5 text-slate-400"></i>目标 Agent
                </label>
                <select id="target-agent" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all cursor-pointer">
                    <option value="">选择在线 Agent...</option>
                    {{range .Agents}}
                    <option value="{{.ID}}" data-os="{{.OS}}">{{.Hostname}} ({{.IP}}) - {{.OS}}</option>
                    {{end}}
                </select>
            </div>

            <!-- 检查类型 -->
            <div>
                <label class="block text-sm font-semibold text-slate-900 mb-3">检查类型</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    <label class="flex items-center gap-3 p-4 border-2 border-indigo-500 bg-indigo-50 rounded-xl cursor-pointer">
                        <input type="radio" name="check_type" value="all" checked class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🔍 全面检查</div>
                            <div class="text-xs text-slate-600">所有检查项</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="check_type" value="misconfig" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">⚙️ 配置缺陷</div>
                            <div class="text-xs text-slate-500">错误配置检查</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="check_type" value="cve" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🛡️ CVE 漏洞</div>
                            <div class="text-xs text-slate-500">已知漏洞匹配</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="check_type" value="binary" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">📦 可执行文件</div>
                            <div class="text-xs text-slate-500">SUID/Capabilities</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="check_type" value="service" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🔧 服务权限</div>
                            <div class="text-xs text-slate-500">不安全服务配置</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="check_type" value="kernel" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🐧 内核漏洞</div>
                            <div class="text-xs text-slate-500">Linux/Windows 内核</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- 按钮 -->
            <div class="flex gap-3 pt-4 border-t border-slate-200">
                <button type="button" onclick="executePrivescCheck()" class="flex-1 h-11 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl flex items-center justify-center gap-2 transition-colors">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>执行提权侦查</span>
                </button>
            </div>
        </form>
    </div>

    <!-- 历史记录 -->
    <div class="mt-8">
        <h2 class="text-xl font-semibold text-slate-900 mb-4">历史检查结果</h2>
        <div id="privesc-history" class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
            <div class="text-center py-8 text-slate-500">
                <i class="fa-solid fa-clock-rotate-left text-4xl mb-2"></i>
                <p>暂无提权侦查记录</p>
            </div>
        </div>
    </div>
</div>

<script>
function executePrivescCheck() {
    const agentId = document.getElementById('target-agent').value;
    const checkType = document.querySelector('input[name="check_type"]:checked').value;

    if (!agentId) {
        showToast('请选择目标 Agent', 'error');
        return;
    }

    showToast('正在执行提权侦查...', 'success');

    fetch(`/agents/${agentId}/privesc`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            check_type: checkType
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast('提权侦查任务已创建', 'success');
        } else {
            showToast('失败: ' + (data.error || ''), 'error');
        }
    })
    .catch(err => {
        console.error('Failed:', err);
        showToast('错误: ' + err, 'error');
    });
}
</script>
{{end}}
