{{define "chat_content"}}
<div class="max-w-7xl mx-auto h-[calc(100vh-120px)]">
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 flex flex-col h-full">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-comments text-indigo-500 text-lg"></i>
                <div>
                    <h1 class="text-lg font-semibold text-slate-900">操作员聊天</h1>
                    <p class="text-xs text-slate-400">实时团队协作通信</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-50 rounded-full">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                    <span class="text-xs text-emerald-600 font-medium">在线</span>
                </div>
                <button onclick="loadMessages()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="刷新">
                    <i class="fa-solid fa-rotate-right text-slate-400"></i>
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
            <div class="text-center text-slate-400 text-sm py-8">
                <i class="fa-solid fa-comments text-4xl mb-2"></i>
                <p>加载中...</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="px-6 py-4 border-t border-slate-200 shrink-0">
            <form id="chat-form" class="flex gap-3">
                <input type="text"
                       id="message-input"
                       placeholder="输入消息... (Ctrl+Enter 发送)"
                       class="flex-1 px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm"
                       autocomplete="off">
                <button type="submit"
                        class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors text-sm font-medium">
                    <i class="fa-solid fa-paper-plane mr-1.5"></i>发送
                </button>
            </form>
        </div>
    </div>
</div>

<script>
const currentUsername = '{{.CurrentUsername}}';
</script>
<script src="/static/js/chat.js"></script>
{{end}}
