{{define "scanner_content"}}
<div class="max-w-7xl mx-auto">
    <!-- 页面标题 -->
    <div class="mb-6">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900">网络扫描器</h1>
        <p class="text-slate-500 text-sm mt-1">端口扫描、服务识别与漏洞探测</p>
    </div>

    <!-- 扫描配置 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 mb-6 shadow-sm hover:shadow-md transition-shadow">
        <div class="flex items-center gap-x-3 mb-5">
            <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-radar text-blue-600"></i>
            </div>
            <div>
                <div class="text-sm font-semibold text-slate-900">新建扫描任务</div>
                <div class="text-xs text-slate-500">选择 Agent 并配置扫描参数</div>
            </div>
        </div>

        <form id="scan-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Agent 选择 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">目标 Agent</label>
                    <select id="scan-agent" class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl px-3 h-10 text-sm cursor-pointer transition-all" required>
                        <option value="">-- 选择 Agent --</option>
                        {{range .Agents}}
                        <option value="{{.ID}}">{{.Hostname}} ({{.IP}})</option>
                        {{end}}
                    </select>
                </div>

                <!-- 目标地址 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">目标地址</label>
                    <input type="text" id="scan-target" placeholder="192.168.1.1 或 10.0.0.0/24"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl px-3 h-10 text-sm font-mono transition-all" required>
                </div>

                <!-- 扫描类型 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">扫描类型</label>
                    <select id="scan-type" class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl px-3 h-10 text-sm cursor-pointer transition-all">
                        <option value="tcp_connect">TCP Connect</option>
                        <option value="tcp_syn">TCP SYN (Stealth)</option>
                        <option value="udp">UDP</option>
                    </select>
                </div>

                <!-- 端口配置 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">端口配置</label>
                    <select id="scan-port-mode" class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl px-3 h-10 text-sm cursor-pointer transition-all">
                        <option value="top">Top 1000 端口</option>
                        <option value="top100">Top 100 端口</option>
                        <option value="custom">自定义范围</option>
                    </select>
                </div>
            </div>

            <!-- 自定义端口范围（条件显示） -->
            <div id="custom-port-range" class="hidden">
                <label class="block text-xs font-semibold text-slate-600 mb-1.5">端口范围</label>
                <input type="text" id="scan-ports" placeholder="1-1000,8080,8443"
                       class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl px-3 h-10 text-sm font-mono transition-all">
                <p class="text-xs text-slate-500 mt-1">支持格式：1-1000,8080,8443</p>
            </div>

            <!-- 操作按钮 -->
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="px-4 h-10 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-xl font-medium flex items-center gap-x-2 transition-colors">
                    <i class="fa-solid fa-play"></i>
                    <span>开始扫描</span>
                </button>
                <span class="text-xs text-slate-500">
                    <i class="fa-solid fa-circle-info mr-1"></i>
                    扫描将在后台执行，结果将实时更新
                </span>
            </div>
        </form>
    </div>

    <!-- 扫描结果 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-list-check text-emerald-600"></i>
                </div>
                <div>
                    <div class="text-sm font-semibold text-slate-900">扫描结果</div>
                    <div class="text-xs text-slate-500" id="result-count">共 0 个开放端口</div>
                </div>
            </div>
            <button onclick="exportResults()" class="px-4 h-10 bg-slate-600 hover:bg-slate-700 text-white text-sm rounded-xl font-medium flex items-center gap-x-2 transition-colors">
                <i class="fa-solid fa-download"></i>
                <span>导出 CSV</span>
            </button>
        </div>

        <!-- 结果表格 -->
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-slate-200">
                        <th class="text-left py-3 px-4 font-semibold text-slate-600">端口</th>
                        <th class="text-left py-3 px-4 font-semibold text-slate-600">协议</th>
                        <th class="text-left py-3 px-4 font-semibold text-slate-600">状态</th>
                        <th class="text-left py-3 px-4 font-semibold text-slate-600">服务</th>
                        <th class="text-left py-3 px-4 font-semibold text-slate-600">版本</th>
                        <th class="text-left py-3 px-4 font-semibold text-slate-600">Banner</th>
                    </tr>
                </thead>
                <tbody id="scan-results-body">
                    <tr>
                        <td colspan="6" class="text-center py-8 text-slate-400">
                            <i class="fa-solid fa-inbox text-3xl mb-2"></i>
                            <p>暂无扫描结果</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 切换端口配置模式
document.getElementById('scan-port-mode').addEventListener('change', function() {
    const customRange = document.getElementById('custom-port-range');
    if (this.value === 'custom') {
        customRange.classList.remove('hidden');
    } else {
        customRange.classList.add('hidden');
    }
});

// 提交扫描任务
document.getElementById('scan-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const agentId = document.getElementById('scan-agent').value;
    const target = document.getElementById('scan-target').value;
    const scanType = document.getElementById('scan-type').value;
    const portMode = document.getElementById('scan-port-mode').value;
    
    const formData = new FormData();
    formData.append('agent_id', agentId);
    formData.append('target', target);
    formData.append('scan_type', scanType);
    
    if (portMode === 'custom') {
        formData.append('port_range', document.getElementById('scan-ports').value);
    } else if (portMode === 'top100') {
        formData.append('top_ports', '100');
    } else {
        formData.append('top_ports', '1000');
    }
    
    try {
        const response = await fetch('/api/scan', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        if (result.success) {
            showToast('扫描任务已创建', 'success');
            // 开始轮询结果
            pollScanResults(result.task_id);
        } else {
            showToast(result.error || '创建失败', 'error');
        }
    } catch (error) {
        showToast('网络错误', 'error');
    }
});

// 轮询扫描结果
let currentTaskId = null;
function pollScanResults(taskId) {
    currentTaskId = taskId;
    
    const poll = async () => {
        try {
            const response = await fetch(`/api/scan/results/${taskId}`);
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                displayScanResults(data.results);
            }
            
            // 继续轮询（可根据任务状态调整）
            setTimeout(poll, 3000);
        } catch (error) {
            showToast('扫描结果轮询失败', 'error');
        }
    };
    
    poll();
}

// 显示扫描结果
function displayScanResults(results) {
    const tbody = document.getElementById('scan-results-body');
    const openPorts = results.filter(r => r.state === 'open');
    
    document.getElementById('result-count').textContent = `共 ${openPorts.length} 个开放端口`;
    
    if (results.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" class="text-center py-8 text-slate-400">
                    <i class="fa-solid fa-inbox text-3xl mb-2"></i>
                    <p>暂无扫描结果</p>
                </td>
            </tr>
        `;
        return;
    }
    
    tbody.innerHTML = results.map(r => `
        <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
            <td class="py-3 px-4 font-mono font-semibold">${r.port}</td>
            <td class="py-3 px-4 uppercase">${r.protocol}</td>
            <td class="py-3 px-4">
                <span class="px-2 py-1 rounded-lg text-xs font-medium ${
                    r.state === 'open' ? 'bg-emerald-100 text-emerald-700' :
                    r.state === 'closed' ? 'bg-slate-100 text-slate-600' :
                    'bg-amber-100 text-amber-700'
                }">${r.state}</span>
            </td>
            <td class="py-3 px-4 font-mono">${r.service || '-'}</td>
            <td class="py-3 px-4 text-xs">${r.version || '-'}</td>
            <td class="py-3 px-4 font-mono text-xs truncate max-w-xs">${r.banner || '-'}</td>
        </tr>
    `).join('');
}

// 导出结果
function exportResults() {
    if (!currentTaskId) {
        showToast('请先执行扫描', 'warning');
        return;
    }
    window.open(`/api/scan/export/${currentTaskId}`, '_blank');
}

</script>
{{end}}
