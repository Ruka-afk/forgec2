{{define "lateral_content"}}
<div class="max-w-7xl mx-auto">
    <!-- 页面标题 -->
    <div class="flex items-end justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">横向移动</h1>
            <p class="text-slate-500 text-sm mt-1">SMB/WinRM/WMI/PsExec 远程执行与 Pass-the-Hash</p>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">在线 Agent</div>
                    <div class="text-3xl font-bold mt-2 text-emerald-600">{{.OnlineAgents}}</div>
                    <div class="text-xs text-slate-500 mt-1">可用于跳板</div>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-xl text-emerald-400"></i>
                </div>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">可用凭据</div>
                    <div class="text-3xl font-bold mt-2 text-amber-600">{{.TotalCreds}}</div>
                    <div class="text-xs text-slate-500 mt-1">凭据保险库</div>
                </div>
                <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-key text-xl text-amber-400"></i>
                </div>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">历史任务</div>
                    <div class="text-3xl font-bold mt-2 text-blue-600">{{.TotalTasks}}</div>
                    <div class="text-xs text-slate-500 mt-1">横向移动</div>
                </div>
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-network-wired text-xl text-blue-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 横向移动配置 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center gap-x-3 mb-5">
            <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-arrows-split-up-and-left text-indigo-600"></i>
            </div>
            <div>
                <div class="text-sm font-semibold text-slate-900">新建横向移动任务</div>
                <div class="text-xs text-slate-500">选择源 Agent、目标主机和执行方式</div>
            </div>
        </div>

        <form id="lateral-form" class="space-y-6">
            <!-- 源 Agent -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    <i class="fa-solid fa-robot mr-1.5 text-slate-400"></i>源 Agent（跳板机）
                </label>
                <select id="source-agent" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all cursor-pointer">
                    <option value="">选择在线 Agent...</option>
                    {{range .Agents}}
                    <option value="{{.ID}}">{{.Hostname}} ({{.IP}}) - {{.OS}}</option>
                    {{end}}
                </select>
            </div>

            <!-- 目标主机 -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    <i class="fa-solid fa-crosshairs mr-1.5 text-slate-400"></i>目标主机
                </label>
                <input type="text" id="target-host" placeholder="IP 地址或主机名 (例: 192.168.1.100)"
                       class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-mono">
            </div>

            <!-- 执行方式 -->
            <div>
                <label class="block text-sm font-semibold text-slate-900 mb-3">执行方式</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    <label class="flex items-center gap-3 p-4 border-2 border-indigo-500 bg-indigo-50 rounded-xl cursor-pointer">
                        <input type="radio" name="method" value="smb" checked class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🔗 SMB (PsExec)</div>
                            <div class="text-xs text-slate-600">远程服务创建</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="method" value="winrm" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">💻 WinRM</div>
                            <div class="text-xs text-slate-500">PowerShell Remoting</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="method" value="wmi" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">⚙️ WMI</div>
                            <div class="text-xs text-slate-500">进程创建</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="method" value="ssh" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🔐 SSH</div>
                            <div class="text-xs text-slate-500">Linux/Unix 主机</div>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                        <input type="radio" name="method" value="pth" class="w-4 h-4 accent-indigo-600">
                        <div>
                            <div class="text-sm font-medium text-slate-900">🎫 Pass-the-Hash</div>
                            <div class="text-xs text-slate-500">NTLM Hash 认证</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- 凭据选择 -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    <i class="fa-solid fa-id-card mr-1.5 text-slate-400"></i>认证凭据
                </label>
                <select id="credential" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all cursor-pointer">
                    <option value="">选择凭据...</option>
                    {{range .Credentials}}
                    <option value="{{.ID}}" data-username="{{.Username}}" data-password="{{.Password}}">
                        {{.Username}} / {{.Type}} - {{.Source}}
                    </option>
                    {{end}}
                </select>
            </div>

            <!-- 自定义凭据 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">用户名（可选）</label>
                    <input type="text" id="username" placeholder="DOMAIN\\username"
                           class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-mono">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">密码/Hash（可选）</label>
                    <input type="password" id="password" placeholder="Password 或 NTLM Hash"
                           class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-mono">
                </div>
            </div>

            <!-- 执行命令 -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    <i class="fa-solid fa-terminal mr-1.5 text-slate-400"></i>执行命令
                </label>
                <input type="text" id="command" placeholder="whoami /all 或 powershell -enc ..."
                       class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-4 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-mono"
                       value="whoami /all">
            </div>

            <!-- 按钮 -->
            <div class="flex gap-3 pt-4 border-t border-slate-200">
                <button type="button" onclick="executeLateral()" class="flex-1 h-11 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl flex items-center justify-center gap-2 transition-colors">
                    <i class="fa-solid fa-rocket"></i>
                    <span>执行横向移动</span>
                </button>
            </div>
        </form>
    </div>

    <!-- 历史记录 -->
    <div class="mt-8">
        <h2 class="text-xl font-semibold text-slate-900 mb-4">历史任务</h2>
        <div id="lateral-history" class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
            <div class="text-center py-8 text-slate-500">
                <i class="fa-solid fa-clock-rotate-left text-4xl mb-2"></i>
                <p>暂无横向移动任务记录</p>
            </div>
        </div>
    </div>
</div>

<script>
function executeLateral() {
    const agentId = document.getElementById('source-agent').value;
    const target = document.getElementById('target-host').value;
    const method = document.querySelector('input[name="method"]:checked').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const command = document.getElementById('command').value;

    if (!agentId) {
        showToast('请选择源 Agent', 'error');
        return;
    }
    if (!target) {
        showToast('请输入目标主机', 'error');
        return;
    }

    const data = {
        target: target,
        method: method,
        username: username,
        password: password,
        command: command
    };

    showToast('正在执行横向移动...', 'success');

    fetch(`/agents/${agentId}/lateral`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast('横向移动任务已创建', 'success');
            document.getElementById('target-host').value = '';
        } else {
            showToast('失败: ' + (data.error || ''), 'error');
        }
    })
    .catch(err => {
        console.error('Failed:', err);
        showToast('错误: ' + err, 'error');
    });
}

// Auto-fill credentials from vault
document.getElementById('credential').addEventListener('change', function() {
    const option = this.options[this.selectedIndex];
    if (option.value) {
        document.getElementById('username').value = option.dataset.username || '';
        document.getElementById('password').value = option.dataset.password || '';
    }
});
</script>
{{end}}
