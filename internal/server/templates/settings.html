{{define "settings_content"}}
<div class="max-w-3xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900">系统设置</h1>
        <p class="text-slate-500">配置 ForgeC2</p>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm mb-6">
        <div class="mb-8">
            <div class="text-xs section-header mb-3">安全设置</div>
            <form hx-post="/settings/password" hx-target="#password-result" class="space-y-5">
                <div>
                    <label class="block text-xs section-header mb-1.5">当前密码</label>
                    <input type="password" name="current_password" required
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11">
                </div>
                <div>
                    <label class="block text-xs section-header mb-1.5">新密码</label>
                    <input type="password" name="new_password" required minlength="8"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11">
                </div>
                <div>
                    <label class="block text-xs section-header mb-1.5">确认新密码</label>
                    <input type="password" name="confirm_password" required minlength="8"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11">
                </div>

                <button type="submit"
                        class="w-full h-11 bg-slate-900 hover:bg-black transition-colors text-white rounded-2xl text-sm font-medium">
                    修改密码
                </button>
            </form>
            <div id="password-result" class="mt-4"></div>
        </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm mb-6">
        <div class="text-xs section-header mb-3">Agent 默认配置</div>
        <form hx-post="/settings/agent" hx-target="#agent-config-result" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs section-header mb-1.5">默认心跳间隔（秒）</label>
                    <input type="number" name="interval" value="{{.DefaultInterval}}" min="1" max="300"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11">
                </div>
                <div>
                    <label class="block text-xs section-header mb-1.5">默认抖动值 (%)</label>
                    <input type="number" name="jitter" value="{{.DefaultJitter}}" min="0" max="100"
                           class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11">
                </div>
            </div>
            <div>
                <label class="block text-xs section-header mb-1.5">默认 User Agent</label>
                <input type="text" name="user_agent" value="{{.DefaultUA}}"
                       class="w-full bg-white border border-slate-300 focus:border-indigo-500 rounded-2xl px-4 h-11">
            </div>

            <button type="submit"
                    class="w-full h-11 bg-indigo-600 hover:bg-indigo-700 transition-colors text-white rounded-2xl text-sm font-medium">
                保存配置
            </button>
        </form>
        <div id="agent-config-result" class="mt-4"></div>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
        <div class="text-xs section-header mb-3">系统信息</div>
        <div class="grid grid-cols-2 gap-4 text-sm">
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="text-slate-500 text-xs">服务器地址</div>
                <div class="font-mono text-slate-700 mt-1">{{.ServerAddress}}</div>
            </div>
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="text-slate-500 text-xs">数据库</div>
                <div class="font-mono text-slate-700 mt-1">SQLite • {{.DatabasePath}}</div>
            </div>
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="text-slate-500 text-xs">总 Agent 数</div>
                <div class="font-mono text-slate-700 mt-1">{{.TotalAgents}}</div>
            </div>
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="text-slate-500 text-xs">在线 Agent</div>
                <div class="font-mono text-slate-700 mt-1">{{.OnlineAgents}}</div>
            </div>
        </div>
    </div>

    <div class="mt-8 text-center text-xs text-slate-400">
        ForgeC2 v1.0 • 单操作员模式<br>
        仅限授权的红队行动使用
    </div>
</div>
{{end}}
