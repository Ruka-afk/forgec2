{{define "files_content"}}
<div class="max-w-7xl mx-auto mb-20 md:mb-0">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 sm:mb-6 gap-3">
            <div class="flex items-start gap-x-3 min-w-0">
                <a href="/agents/{{.Agent.ID}}" class="text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 shrink-0 mt-1">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </a>
                <div class="min-w-0">
                    <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">文件浏览器</h1>
                    <div class="flex flex-wrap items-center gap-x-2 text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-1">
                        <span>{{.Agent.Hostname}}</span>
                        <span class="text-slate-300">•</span>
                        <span>{{.Agent.Username}}@{{.Agent.IP}}</span>
                        {{if eq .Agent.Status "online"}}
                        <span class="flex items-center text-emerald-500"><i class="fa-solid fa-circle fa-beat mr-1 text-[6px]"></i> 在线</span>
                        {{else}}
                        <span class="text-red-500">离线</span>
                        {{end}}
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2 sm:gap-x-3 flex-wrap">
                <button data-action="refresh-list" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 h-9 rounded-xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>刷新</span>
                </button>
                <button data-action="upload-local-file" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 h-9 rounded-xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-upload"></i>
                    <span>上传本地文件</span>
                </button>
            </div>
    </div>

    <!-- Path Bar -->
    <div class="bg-white border-b border-slate-200 px-6 py-3">
        <div class="flex items-center gap-x-2">
            <i class="fa-solid fa-folder text-indigo-500"></i>
            <input type="text" id="current-path" value="C:\" 
                   class="flex-1 bg-slate-50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 h-10 text-sm font-mono"
                   placeholder="输入路径...">
            <button data-action="navigate-to-path" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 h-10 rounded-xl text-sm">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
        <div class="flex items-center gap-x-2 mt-2 text-xs text-slate-500">
            <span>快捷路径:</span>
            <button data-action="go-to" data-path="C:\\" class="hover:text-indigo-600">C:\</button>
            <span class="text-slate-300">|</span>
            <button data-action="go-to" data-path="C:\\Users" class="hover:text-indigo-600">Users</button>
            <span class="text-slate-300">|</span>
            <button data-action="go-to" data-path="C:\\Windows" class="hover:text-indigo-600">Windows</button>
            <span class="text-slate-300">|</span>
            <button data-action="go-to" data-path="C:\\Program Files" class="hover:text-indigo-600">Program Files</button>
            <span class="text-slate-300">|</span>
            <button data-action="go-to" data-path="%TEMP%" class="hover:text-indigo-600">Temp</button>
        </div>
    </div>

    <!-- File List -->
    <div class="px-6 py-4">
        <div class="bg-white rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
            <!-- Loading State -->
            <div id="loading-state" class="hidden p-8 text-center">
                <i class="fa-solid fa-spinner fa-spin text-2xl text-indigo-500 mb-3"></i>
                <p class="text-slate-500">正在加载文件列表...</p>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden p-8 text-center">
                <i class="fa-solid fa-folder-open text-4xl text-slate-300 mb-3"></i>
                <p class="text-slate-500">目录为空或无法访问</p>
            </div>

            <!-- File Table -->
            <div id="file-table">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200 dark:border-slate-700">
                        <tr>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">类型</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">名称</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">大小</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">修改时间</th>
                            <th class="text-right py-3 px-4 text-xs font-medium text-slate-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="file-list" class="divide-y divide-slate-100">
                        <!-- Files will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- File Preview Modal -->
    <div id="preview-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl max-w-3xl w-full mx-4 max-h-[80vh] overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
                <h3 id="preview-title" class="text-lg font-semibold text-slate-900">文件预览</h3>
                <button data-action="close-preview" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            <div id="preview-content" class="p-6 overflow-auto max-h-[60vh]">
                <!-- Preview content -->
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl max-w-md w-full mx-4">
            <div class="p-6">
                <div class="flex items-center gap-x-3 mb-4">
                    <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-trash text-red-500"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-900">确认删除</h3>
                        <p id="delete-file-name" class="text-sm text-slate-500"></p>
                    </div>
                </div>
                <p class="text-slate-600 mb-6">此操作无法撤销，确定要删除此文件或目录吗？</p>
                <div class="flex gap-x-3">
                    <button data-action="close-delete-modal" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 h-10 rounded-xl text-sm">
                        取消
                    </button>
                    <button data-action="confirm-delete-file" class="flex-1 bg-red-600 hover:bg-red-700 text-white h-10 rounded-xl text-sm">
                        确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl max-w-md w-full mx-4">
            <div class="p-6">
                <div class="flex items-center gap-x-3 mb-4">
                    <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-upload text-emerald-500"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-900">上传文件到服务器</h3>
                        <p id="upload-file-name" class="text-sm text-slate-500"></p>
                    </div>
                </div>
                <p class="text-slate-600 mb-6">将此文件从目标机器上传到服务器保存？</p>
                <div class="flex gap-x-3">
                    <button data-action="close-upload-modal" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 h-10 rounded-xl text-sm">
                        取消
                    </button>
                    <button data-action="confirm-upload-file" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white h-10 rounded-xl text-sm">
                        确认上传
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>const agentId = '{{.Agent.ID}}';</script>
{{end}}
