{{define "audit_content"}}
<div class="max-w-7xl mx-auto mb-20 md:mb-0">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 sm:mb-6 gap-3">
            <div>
                <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">安全审计日志</h1>
                <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-1">记录所有系统操作和访问行为</p>
            </div>
            <button onclick="exportLogs()" class="ui-btn ui-btn-primary h-11 shrink-0">
                <i class="fa-solid fa-download"></i>
                <span>导出日志</span>
            </button>
    </div>

    <!-- Filters -->
    <div class="bg-white border-b border-slate-200 px-6 py-4">
        <div class="flex items-center gap-x-4 flex-wrap">
            <div class="relative flex-1 max-w-md">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500"></i>
                <input type="text" id="search-input" placeholder="搜索用户、资源或详情..." 
                       class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl pl-11 pr-4 h-11 text-sm">
            </div>
            <select id="user-filter" class="bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl px-4 h-11 text-sm min-w-[140px]">
                <option value="">所有操作员</option>
                {{range .UserList}}<option value="{{.Username}}">{{.Username}} ({{.Role}})</option>{{end}}
            </select>
            <select id="action-filter" class="bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 rounded-xl px-4 h-11 text-sm">
                <option value="">所有操作</option>
                <option value="login">登录</option>
                <option value="logout">退出</option>
                <option value="send_command">发送命令</option>
                <option value="command_result">命令结果</option>
                <option value="batch_command">批量命令</option>
                <option value="agent_action">Implant 操作</option>
                <option value="kill_agent">终止 Implant</option>
                <option value="delete_agent">删除 Implant</option>
                <option value="request_screenshot">请求截图</option>
                <option value="request_ps">请求进程列表</option>
                <option value="generate">生成 Implant</option>
                <option value="screen_monitor_start">启动监控</option>
                <option value="screen_monitor_stop">停止监控</option>
                <option value="file_ls">文件列表</option>
                <option value="file_delete">文件删除</option>
                <option value="file_read">文件读取</option>
                <option value="file_upload_exfil">文件上传(内传)</option>
                <option value="file_download_exfil">文件下载(外传)</option>
            </select>
            <button onclick="applyFilters()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 h-11 rounded-xl text-sm flex items-center gap-x-2">
                <i class="fa-solid fa-filter"></i>
                <span>筛选</span>
            </button>
            <button onclick="resetFilters()" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 px-5 h-11 rounded-xl text-sm">
                重置
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-6">
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-sm overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-file-text text-indigo-500"></i>
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-300">审计记录</span>
                    </div>
                    <span class="text-xs text-slate-500" id="total-count">共 0 条记录</span>
                </div>
            </div>
            <div class="overflow-x-auto table-scroll-container" id="audit-table-container">
                <div class="skeleton-wrapper" id="audit-skeleton">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-10"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-8"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-6"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-8"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-10"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-14"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-10"></div></th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-slate-500"><div class="skeleton skeleton-text-sm w-10"></div></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr class="skeleton-table-row">
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-24 mb-1"></div><div class="skeleton skeleton-text-sm w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-24"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-32"></div></td>
                            </tr>
                            <tr class="skeleton-table-row">
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-28 mb-1"></div><div class="skeleton skeleton-text-sm w-24"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-24"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-14"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-28"></div></td>
                            </tr>
                            <tr class="skeleton-table-row">
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-20 mb-1"></div><div class="skeleton skeleton-text-sm w-28"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-24"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-24"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-28"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-24"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-36"></div></td>
                            </tr>
                            <tr class="skeleton-table-row">
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-32 mb-1"></div><div class="skeleton skeleton-text-sm w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-18"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-20"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-28"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-18"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-28"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-18"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-24"></div></td>
                            </tr>
                            <tr class="skeleton-table-row">
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-26 mb-1"></div><div class="skeleton skeleton-text-sm w-22"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-22"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-28"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-22"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-32"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-22"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-12"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-30"></div></td>
                            </tr>
                            <tr class="skeleton-table-row">
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-24 mb-1"></div><div class="skeleton skeleton-text-sm w-26"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-28"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-22"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-18"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-22"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text-sm w-32"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-badge w-16"></div></td>
                                <td class="py-3 px-4"><div class="skeleton skeleton-text w-20"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="skeleton-content">
                <table class="w-full" id="audit-list-table">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">时间</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">用户</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">IP</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">操作</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">资源</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">Implant</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">状态</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">详情</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body" class="divide-y divide-slate-100 dark:divide-slate-700">
                        <tr>
                            <td colspan="8" class="py-16 text-center text-slate-400">
                                <i class="fa-solid fa-spinner fa-spin text-xl mb-2"></i>
                                <p>加载中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>
            <!-- Pagination -->
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                <div class="text-xs text-slate-500">
                    显示 <span id="page-info">0-0</span> 条
                </div>
                <div class="flex items-center gap-x-2">
                    <button id="prev-page" onclick="prevPage()" 
                            class="px-3 h-8 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        上一页
                    </button>
                    <span id="current-page" class="text-xs text-slate-600 dark:text-slate-300 px-2">1</span>
                    <button id="next-page" onclick="nextPage()" 
                            class="px-3 h-8 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        下一页
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
