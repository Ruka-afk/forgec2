{{define "audit_content"}}
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
    <!-- Header -->
    <div class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-slate-900">安全审计日志</h1>
                <div class="text-sm text-slate-500 mt-1">记录所有系统操作和访问行为</div>
            </div>
            <button onclick="exportLogs()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 h-11 rounded-xl text-sm font-medium flex items-center gap-x-2">
                <i class="fa-solid fa-download"></i>
                <span>导出日志</span>
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white border-b border-slate-200 px-6 py-4">
        <div class="flex items-center gap-x-4 flex-wrap">
            <div class="relative flex-1 max-w-md">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="搜索用户、资源或详情..." 
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 h-11 text-sm">
            </div>
            <select id="action-filter" class="bg-slate-50 border border-slate-200 rounded-xl px-4 h-11 text-sm">
                <option value="">所有操作</option>
                <option value="login">登录</option>
                <option value="logout">退出</option>
                <option value="agent_action">Agent 操作</option>
                <option value="generate">生成 Agent</option>
                <option value="screen_monitor_start">启动监控</option>
                <option value="screen_monitor_stop">停止监控</option>
            </select>
            <button onclick="applyFilters()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 h-11 rounded-xl text-sm flex items-center gap-x-2">
                <i class="fa-solid fa-filter"></i>
                <span>筛选</span>
            </button>
            <button onclick="resetFilters()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 h-11 rounded-xl text-sm">
                重置
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-6">
        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-file-text text-indigo-500"></i>
                        <span class="text-sm font-medium text-slate-700">审计记录</span>
                    </div>
                    <span class="text-xs text-slate-500" id="total-count">共 0 条记录</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">时间</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">用户</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">IP</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">操作</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">资源</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">Agent</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">状态</th>
                            <th class="text-left py-3 px-4 text-xs font-medium text-slate-500">详情</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="8" class="py-16 text-center text-slate-400">
                                <i class="fa-solid fa-spinner fa-spin text-xl mb-2"></i>
                                <p>加载中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                <div class="text-xs text-slate-500">
                    显示 <span id="page-info">0-0</span> 条
                </div>
                <div class="flex items-center gap-x-2">
                    <button id="prev-page" onclick="prevPage()" 
                            class="px-3 h-8 bg-white border border-slate-200 rounded-lg text-xs text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        上一页
                    </button>
                    <span id="current-page" class="text-xs text-slate-600 px-2">1</span>
                    <button id="next-page" onclick="nextPage()" 
                            class="px-3 h-8 bg-white border border-slate-200 rounded-lg text-xs text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        下一页
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let totalPages = 1;
let totalRecords = 0;
const pageSize = 50;

function loadLogs() {
    const search = document.getElementById('search-input').value;
    const action = document.getElementById('action-filter').value;
    
    fetch(`/audit/logs?page=${currentPage}&pageSize=${pageSize}&search=${encodeURIComponent(search)}&action=${action}`)
    .then(r => r.json()).then(data => {
        if (data.success) {
            renderLogs(data.data);
            totalRecords = data.total;
            totalPages = Math.ceil(totalRecords / pageSize);
            updatePagination();
        } else {
            showError(data.error || '加载失败');
        }
    }).catch(err => showError('网络错误: ' + err));
}

function renderLogs(logs) {
    const tbody = document.getElementById('log-table-body');
    
    if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="py-16 text-center text-slate-400">暂无审计记录</td></tr>';
        return;
    }

    tbody.innerHTML = logs.map(log => `
        <tr class="hover:bg-slate-50 transition-colors">
            <td class="py-3 px-4 text-sm text-slate-600">${formatTime(log.created_at)}</td>
            <td class="py-3 px-4 text-sm">
                <span class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded-lg text-xs">${escapeHtml(log.user)}</span>
            </td>
            <td class="py-3 px-4 text-sm text-slate-600 font-mono">${escapeHtml(log.ip) || '-'}</td>
            <td class="py-3 px-4 text-sm">
                <span class="px-2 py-1 ${getActionClass(log.action)} rounded-lg text-xs">${getActionLabel(log.action)}</span>
            </td>
            <td class="py-3 px-4 text-sm text-slate-600">${escapeHtml(log.resource) || '-'}</td>
            <td class="py-3 px-4 text-sm text-slate-600 font-mono">${log.agent_id ? log.agent_id.substring(0, 8) + '...' : '-'}</td>
            <td class="py-3 px-4 text-sm">
                <span class="flex items-center">
                    ${log.success ? '<i class="fa-solid fa-check-circle text-emerald-500 mr-1"></i><span class="text-emerald-600">成功</span>' : '<i class="fa-solid fa-x-circle text-red-500 mr-1"></i><span class="text-red-600">失败</span>'}
                </span>
            </td>
            <td class="py-3 px-4 text-sm text-slate-500 max-w-xs truncate" title="${escapeHtml(log.details || log.error || '-')}">
                ${escapeHtml(log.details || log.error || '-')}
            </td>
        </tr>
    `).join('');
}

function formatTime(timeStr) {
    if (!timeStr) return '-';
    const date = new Date(timeStr);
    return date.toLocaleString('zh-CN');
}

function getActionClass(action) {
    const classes = {
        'login': 'bg-emerald-100 text-emerald-700',
        'logout': 'bg-slate-100 text-slate-700',
        'agent_action': 'bg-blue-100 text-blue-700',
        'generate': 'bg-purple-100 text-purple-700',
        'screen_monitor_start': 'bg-cyan-100 text-cyan-700',
        'screen_monitor_stop': 'bg-orange-100 text-orange-700',
    };
    return classes[action] || 'bg-gray-100 text-gray-700';
}

function getActionLabel(action) {
    const labels = {
        'login': '登录',
        'logout': '退出',
        'agent_action': 'Agent 操作',
        'generate': '生成 Agent',
        'screen_monitor_start': '启动监控',
        'screen_monitor_stop': '停止监控',
    };
    return labels[action] || action;
}

function updatePagination() {
    document.getElementById('total-count').textContent = `共 ${totalRecords} 条记录`;
    document.getElementById('current-page').textContent = currentPage;
    document.getElementById('prev-page').disabled = currentPage <= 1;
    document.getElementById('next-page').disabled = currentPage >= totalPages;
    
    const start = (currentPage - 1) * pageSize + 1;
    const end = Math.min(currentPage * pageSize, totalRecords);
    document.getElementById('page-info').textContent = `${start}-${end}`;
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadLogs();
    }
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        loadLogs();
    }
}

function applyFilters() {
    currentPage = 1;
    loadLogs();
}

function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('action-filter').value = '';
    currentPage = 1;
    loadLogs();
}

function exportLogs() {
    const search = document.getElementById('search-input').value;
    const action = document.getElementById('action-filter').value;
    
    fetch(`/audit/logs?page=1&pageSize=${totalRecords}&search=${encodeURIComponent(search)}&action=${action}`)
    .then(r => r.json()).then(data => {
        if (data.success) {
            const csv = convertToCSV(data.data);
            downloadCSV(csv);
        } else {
            showError(data.error || '导出失败');
        }
    }).catch(err => showError('网络错误: ' + err));
}

function convertToCSV(logs) {
    const headers = ['时间', '用户', 'IP', '操作', '资源', 'Agent', '状态', '详情'];
    const rows = logs.map(log => [
        formatTime(log.created_at),
        log.user,
        log.ip || '',
        getActionLabel(log.action),
        log.resource || '',
        log.agent_id || '',
        log.success ? '成功' : '失败',
        log.details || log.error || ''
    ]);
    
    return [headers.join(','), ...rows.map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(','))].join('\n');
}

function downloadCSV(content) {
    const blob = new Blob([`\uFEFF${content}`], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `audit_logs_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showError(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'px-4 py-3 rounded-2xl shadow-xl flex items-center gap-x-3 text-sm bg-red-100 border border-red-300 text-red-700';
    toast.innerHTML = `<i class="fa-solid fa-exclamation-circle"></i><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'all 0.3s ease';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// Initial load
document.getElementById('search-input').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') applyFilters();
});

loadLogs();
</script>
{{end}}
