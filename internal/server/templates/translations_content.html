{{define "translations_content"}}
<div class="p-6">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">翻译管理</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2">管理和配置ForgeC2多语言翻译</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- 翻译统计 -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">翻译统计</h2>
            <div id="translationStats" class="space-y-4">
                <div class="text-center text-gray-500 py-4">加载中...</div>
            </div>
        </div>

        <!-- 语言选择 -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">语言设置</h2>
            <div class="space-y-4">
                <select id="languageSelect" onchange="loadTranslations()" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white">
                    <option value="zh-CN">简体中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
                <button onclick="exportTranslations()" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    导出翻译文件
                </button>
            </div>
        </div>
    </div>

    <!-- 翻译列表 -->
    <div class="mt-6 bg-white dark:bg-gray-800 rounded-lg shadow">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">翻译条目</h2>
        </div>
        <div id="translationsList" class="p-4 max-h-96 overflow-y-auto">
            <div class="text-center text-gray-500 py-8">加载中...</div>
        </div>
    </div>
</div>

<script>
async function loadStats() {
    try {
        const resp = await fetch('/api/translations/stats');
        const data = await resp.json();
        
        if (data.success) {
            renderStats(data.stats);
        }
    } catch (e) {
        console.error('加载统计失败:', e);
    }
}

function renderStats(stats) {
    const container = document.getElementById('translationStats');
    
    const languages = ['zh-CN', 'en', 'ja', 'ko'];
    container.innerHTML = languages.map(lang => `
        <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded">
            <span class="font-medium text-gray-900 dark:text-white">${getLanguageName(lang)}</span>
            <span class="text-sm text-gray-600 dark:text-gray-300">${stats[lang] || 0} 条已翻译</span>
        </div>
    `).join('');
}

function getLanguageName(code) {
    const names = {
        'zh-CN': '简体中文',
        'en': 'English',
        'ja': '日本語',
        'ko': '한국어'
    };
    return names[code] || code;
}

async function loadTranslations() {
    const lang = document.getElementById('languageSelect').value;
    
    try {
        const resp = await fetch(`/api/translations?lang=${lang}`);
        const data = await resp.json();
        
        if (data.success) {
            renderTranslations(data.translations);
        }
    } catch (e) {
        console.error('加载翻译失败:', e);
    }
}

function renderTranslations(translations) {
    const container = document.getElementById('translationsList');
    
    const keys = Object.keys(translations);
    if (keys.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 py-8"><p>暂无翻译</p></div>';
        return;
    }
    
    container.innerHTML = keys.slice(0, 50).map(key => `
        <div class="border-b border-gray-100 dark:border-gray-700 py-2">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">${key}</div>
            <div class="text-gray-900 dark:text-white">${translations[key]}</div>
        </div>
    `).join('');
    
    if (keys.length > 50) {
        container.innerHTML += `<div class="text-center text-gray-500 py-4">显示前50条，共 ${keys.length} 条</div>`;
    }
}

function exportTranslations() {
    const lang = document.getElementById('languageSelect').value;
    window.open(`/api/translations?lang=${lang}`, '_blank');
}

// Initial load
loadStats();
loadTranslations();
</script>
{{end}}
