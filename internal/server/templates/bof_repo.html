{{define "bof_repo_content"}}
<div class="max-w-6xl mx-auto space-y-6">
    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 dark:from-purple-800 dark:to-indigo-900 rounded-3xl shadow-sm p-6 text-white">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-boxes-stack text-2xl"></i></div>
            <div><h1 class="text-xl font-bold">BOF 社区仓库</h1><p class="text-sm text-purple-200 dark:text-purple-300">浏览社区 BOF 并一键导入</p></div>
        </div>
    </div>

    <div class="ui-card shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center gap-3">
            <div class="w-8 h-8 bg-purple-100 dark:bg-purple-900/40 rounded-xl flex items-center justify-center text-purple-600 dark:text-purple-400"><i class="fa-solid fa-book"></i></div>
            <div><h2 class="text-sm font-semibold">社区 BOF 源</h2><p class="text-[11px] text-slate-500 dark:text-slate-400">从社区仓库浏览并导入 BOF</p></div>
        </div>
        <div class="p-6">
            <div id="repo-list" class="space-y-3">
                <div class="text-center text-xs text-slate-400 dark:text-slate-500 py-8"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
            </div>
        </div>
    </div>

    <div class="ui-card shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/40 rounded-xl flex items-center justify-center text-indigo-600 dark:text-indigo-400"><i class="fa-solid fa-upload"></i></div>
            <div><h2 class="text-sm font-semibold">手动上传 BOF</h2><p class="text-[11px] text-slate-500 dark:text-slate-400">从 URL 下载 .o 文件并注册到 BOF 列表</p></div>
        </div>
        <div class="p-6">
            <div class="flex gap-3">
                <input id="bof-url" class="flex-1 ui-input" placeholder="https://raw.githubusercontent.com/.../example.o">
                <input id="bof-name" class="w-48 ui-input" placeholder="BOF 名称">
                <button data-action="import-bof-from-url" class="px-5 py-2.5 ui-btn ui-btn-primary">导入</button>
            </div>
            <div id="bof-import-result" class="hidden mt-3 text-xs"></div>
        </div>
    </div>
</div>
{{end}}
