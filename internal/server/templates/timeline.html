{{define "timeline_content"}}
<div class="max-w-7xl mx-auto">
    <!-- 页面标题 -->
    <div class="flex items-end justify-between mb-6">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">行动时间线</h1>
            <p class="text-slate-500 text-sm mt-1">按时间顺序查看所有审计日志、任务执行和操作记录</p>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="exportTimeline()" class="px-4 h-10 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl text-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-download text-slate-600"></i>
                <span class="text-slate-700">导出 CSV</span>
            </button>
            <button onclick="loadTimeline()" class="px-4 h-10 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-sync"></i>
                <span>刷新</span>
            </button>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-4 mb-4 shadow-sm">
        <form id="timeline-filter" class="flex flex-wrap items-center gap-3">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-filter text-indigo-500 text-sm"></i>
                <span class="text-sm font-semibold text-slate-700">筛选</span>
            </div>

            <select id="filter-type" class="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 h-10 focus:outline-none focus:border-indigo-500 cursor-pointer">
                <option value="">全部类型</option>
                <option value="audit">审计日志</option>
                <option value="task">任务执行</option>
            </select>

            <div class="flex-1 min-w-[200px] relative">
                <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="filter-user" placeholder="筛选用户..."
                       class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl pl-9 pr-3 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all">
            </div>

            <div class="flex-1 min-w-[200px] relative">
                <i class="fa-solid fa-robot absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="filter-agent" placeholder="筛选 Agent ID 或名称..."
                       class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl pl-9 pr-3 h-10 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all">
            </div>

            <button type="button" onclick="applyFilters()" class="px-5 h-10 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium transition-colors">
                <i class="fa-solid fa-check mr-1.5"></i>应用
            </button>

            <button type="button" onclick="clearFilters()" class="px-4 h-10 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl text-sm transition-colors">
                <i class="fa-solid fa-times text-slate-600"></i>
            </button>
        </form>
    </div>

    <!-- 统计信息 -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">总事件数</div>
                    <div class="text-3xl font-bold mt-2 text-slate-900" id="total-events">0</div>
                    <div class="text-xs text-slate-500 mt-1">最近 200 条</div>
                </div>
                <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-clock-rotate-left text-xl text-slate-400"></i>
                </div>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">审计日志</div>
                    <div class="text-3xl font-bold mt-2 text-blue-600" id="audit-count">0</div>
                    <div class="text-xs text-slate-500 mt-1">用户操作记录</div>
                </div>
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-xl text-blue-400"></i>
                </div>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">任务执行</div>
                    <div class="text-3xl font-bold mt-2 text-emerald-600" id="task-count">0</div>
                    <div class="text-xs text-slate-500 mt-1">Agent 任务</div>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-list-check text-xl text-emerald-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 时间线 -->
    <div id="timeline-container" class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
        <div id="timeline-loading" class="text-center py-12">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-3"></i>
            <p class="text-slate-500 text-sm">加载时间线...</p>
        </div>
        <div id="timeline-list" class="hidden">
            <!-- 时间线事件将在这里渲染 -->
        </div>
        <div id="timeline-empty" class="hidden text-center py-12">
            <i class="fa-solid fa-timeline text-6xl text-slate-300 mb-4"></i>
            <h3 class="text-lg font-medium text-slate-700 mb-2">暂无时间线事件</h3>
            <p class="text-slate-500">开始执行任务或进行操作后，时间线将在这里显示</p>
        </div>
    </div>
</div>

<script>
let allEvents = [];

document.addEventListener('DOMContentLoaded', function() {
    loadTimeline();
});

function loadTimeline() {
    document.getElementById('timeline-loading').classList.remove('hidden');
    document.getElementById('timeline-list').classList.add('hidden');
    document.getElementById('timeline-empty').classList.add('hidden');

    const params = new URLSearchParams();
    const type = document.getElementById('filter-type').value;
    const user = document.getElementById('filter-user').value;
    const agent = document.getElementById('filter-agent').value;

    if (type) params.set('type', type);
    if (user) params.set('user', user);
    if (agent) params.set('agent', agent);

    fetch('/api/timeline/data?' + params.toString())
        .then(r => r.json())
        .then(data => {
            allEvents = data.events || [];
            renderTimeline(allEvents);
            updateStats(allEvents);
        })
        .catch(err => {
            console.error('Failed to load timeline:', err);
            showToast('加载时间线失败', 'error');
        });
}

function renderTimeline(events) {
    const container = document.getElementById('timeline-list');
    const loading = document.getElementById('timeline-loading');
    const empty = document.getElementById('timeline-empty');

    loading.classList.add('hidden');

    if (events.length === 0) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
    }

    empty.classList.add('hidden');
    container.classList.remove('hidden');

    let html = '<div class="space-y-4">';

    events.forEach((event, index) => {
        const time = new Date(event.timestamp);
        const timeStr = time.toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        const isAudit = event.type === 'audit';
        const icon = isAudit ? 'fa-shield-halved' : 'fa-terminal';
        const iconBg = isAudit ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600';
        const badgeColor = isAudit ? 'bg-blue-50 text-blue-700' : 'bg-emerald-50 text-emerald-700';
        const badgeText = isAudit ? '审计' : '任务';

        const successBadge = event.success
            ? '<span class="text-xs px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded-md font-medium">成功</span>'
            : '<span class="text-xs px-2 py-0.5 bg-red-50 text-red-700 rounded-md font-medium">失败</span>';

        html += `
        <div class="flex gap-4 group">
            <!-- 时间线节点 -->
            <div class="flex flex-col items-center">
                <div class="w-10 h-10 ${iconBg} rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid ${icon}"></i>
                </div>
                ${index < events.length - 1 ? '<div class="w-0.5 h-full bg-slate-200 mt-2"></div>' : ''}
            </div>

            <!-- 事件卡片 -->
            <div class="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-4 hover:bg-slate-100 transition-colors">
                <div class="flex items-start justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-mono text-slate-600">${timeStr}</span>
                        <span class="text-xs px-2 py-0.5 ${badgeColor} rounded-md font-medium">${badgeText}</span>
                        ${event.agent_id ? `<a href="/agents/${event.agent_id}" class="text-xs px-2 py-0.5 bg-indigo-50 text-indigo-700 rounded-md font-medium hover:bg-indigo-100 transition-colors">${event.agent_name || event.agent_id}</a>` : ''}
                    </div>
                    <div class="flex items-center gap-2">
                        ${successBadge}
                        ${event.ip ? `<span class="text-xs text-slate-500 font-mono">${event.ip}</span>` : ''}
                    </div>
                </div>

                <div class="flex items-start justify-between gap-4">
                    <div class="flex-1">
                        <div class="text-sm font-medium text-slate-900 mb-1">${event.action}</div>
                        ${event.details ? `<div class="text-xs text-slate-600 font-mono bg-white border border-slate-200 rounded-lg p-2 mt-2 max-h-20 overflow-auto">${escapeHtml(event.details)}</div>` : ''}
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-500">
                            <i class="fa-solid fa-user mr-1"></i>${event.user || 'system'}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        `;
    });

    html += '</div>';
    container.innerHTML = html;
}

function updateStats(events) {
    document.getElementById('total-events').textContent = events.length;

    const auditCount = events.filter(e => e.type === 'audit').length;
    const taskCount = events.filter(e => e.type === 'task').length;

    document.getElementById('audit-count').textContent = auditCount;
    document.getElementById('task-count').textContent = taskCount;
}

function applyFilters() {
    loadTimeline();
}

function clearFilters() {
    document.getElementById('filter-type').value = '';
    document.getElementById('filter-user').value = '';
    document.getElementById('filter-agent').value = '';
    loadTimeline();
}

function exportTimeline() {
    const params = new URLSearchParams();
    const type = document.getElementById('filter-type').value;
    const user = document.getElementById('filter-user').value;
    const agent = document.getElementById('filter-agent').value;

    if (type) params.set('type', type);
    if (user) params.set('user', user);
    if (agent) params.set('agent', agent);

    window.open('/api/timeline/export?' + params.toString(), '_blank');
    showToast('正在导出时间线...', 'success');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{{end}}
